<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>年会抽奖工具</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
            background: linear-gradient(135deg, #5c0000 0%, #8b0000 35%, #991a1a 65%, #5c0000 100%);
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            overflow: hidden;
            position: relative;
            padding-top: 40px;
            transition: background 0.3s ease;
        }

        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: url('data:image/svg+xml,%3Csvg width="100" height="100" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg"%3E%3Cpath d="M11 18c3.866 0 7-3.134 7-7s-3.134-7-7-7-7 3.134-7 7 3.134 7 7 7zm48 25c3.866 0 7-3.134 7-7s-3.134-7-7-7-7 3.134-7 7 3.134 7 7 7zm-43-7c1.657 0 3-1.343 3-3s-1.343-3-3-3-3 1.343-3 3 1.343 3 3 3zm63 31c1.657 0 3-1.343 3-3s-1.343-3-3-3-3 1.343-3 3 1.343 3 3 3zM34 90c1.657 0 3-1.343 3-3s-1.343-3-3-3-3 1.343-3 3 1.343 3 3 3zm56-76c1.657 0 3-1.343 3-3s-1.343-3-3-3-3 1.343-3 3 1.343 3 3 3zM12 86c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm28-65c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm23-11c2.76 0 5-2.24 5-5s-2.24-5-5-5-5 2.24-5 5 2.24 5 5 5zm-6 60c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm29 22c2.76 0 5-2.24 5-5s-2.24-5-5-5-5 2.24-5 5 2.24 5 5 5zM32 63c2.76 0 5-2.24 5-5s-2.24-5-5-5-5 2.24-5 5 2.24 5 5 5zm57-13c2.76 0 5-2.24 5-5s-2.24-5-5-5-5 2.24-5 5 2.24 5 5 5zm-9-21c1.105 0 2-.895 2-2s-.895-2-2-2-2 .895-2 2 .895 2 2 2zM60 91c1.105 0 2-.895 2-2s-.895-2-2-2-2 .895-2 2 .895 2 2 2zM35 41c1.105 0 2-.895 2-2s-.895-2-2-2-2 .895-2 2 .895 2 2 2zM12 60c1.105 0 2-.895 2-2s-.895-2-2-2-2 .895-2 2 .895 2 2 2z" fill="%23ffd700" fill-opacity="0.08" fill-rule="evenodd"/%3E%3C/svg%3E');
            z-index: 0;
        }

        /* Logo Display */
        .logo-display {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 100;
            max-width: 150px;
            max-height: 100px;
        }

        .logo-display img {
            max-width: 100%;
            max-height: 100px;
            object-fit: contain;
            filter: drop-shadow(0 0 10px rgba(255, 215, 0, 0.5));
        }

        /* Sidebar */
        .sidebar {
            position: fixed;
            top: 0;
            left: -350px;
            width: 350px;
            height: 100vh;
            background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(20px);
            z-index: 1000;
            transition: left 0.3s ease;
            overflow-y: auto;
            padding: 30px 25px;
            border-right: 3px solid #ffd700;
        }

        .sidebar.open {
            left: 0;
        }

        .sidebar-toggle {
            position: fixed;
            top: 30px;
            left: 30px;
            width: 60px;
            height: 60px;
            background: rgba(0, 0, 0, 0.8);
            border: 2px solid #ffd700;
            border-radius: 50%;
            cursor: pointer;
            z-index: 1001;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 6px;
            transition: all 0.3s ease;
        }

        .sidebar-toggle:hover {
            background: rgba(255, 215, 0, 0.2);
            transform: scale(1.1);
        }

        .sidebar-toggle span {
            width: 30px;
            height: 3px;
            background: #ffd700;
            border-radius: 3px;
            transition: all 0.3s ease;
        }

        .sidebar.open ~ .sidebar-toggle span:nth-child(1) {
            transform: rotate(45deg) translate(6px, 6px);
        }

        .sidebar.open ~ .sidebar-toggle span:nth-child(2) {
            opacity: 0;
        }

        .sidebar.open ~ .sidebar-toggle span:nth-child(3) {
            transform: rotate(-45deg) translate(6px, -6px);
        }

        .sidebar-header {
            text-align: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid rgba(255, 215, 0, 0.3);
        }

        .sidebar-header h2 {
            color: #ffd700;
            font-size: 1.5em;
            margin-bottom: 10px;
        }

        .panel {
            background: rgba(255, 255, 255, 0.08);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid rgba(255, 215, 0, 0.3);
        }

        .panel-title {
            color: #ffd700;
            font-size: 1.1em;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .upload-area {
            border: 2px dashed #ffd700;
            border-radius: 10px;
            padding: 25px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            background: rgba(255, 215, 0, 0.05);
        }

        .upload-area:hover {
            background: rgba(255, 215, 0, 0.15);
            border-color: #fff;
        }

        .upload-area.dragover {
            background: rgba(255, 215, 0, 0.2);
        }

        .upload-icon {
            font-size: 2.5em;
            margin-bottom: 8px;
        }

        .upload-text {
            color: #fff;
            font-size: 1em;
        }

        .upload-hint {
            color: #aaa;
            font-size: 0.85em;
            margin-top: 5px;
        }

        input[type="file"] {
            display: none;
        }

        .file-info {
            background: rgba(0, 255, 136, 0.1);
            padding: 12px;
            border-radius: 8px;
            margin-top: 15px;
            border: 1px solid rgba(0, 255, 136, 0.3);
            display: none;
        }

        .file-info.success {
            display: block;
        }

        .file-info-text {
            color: #00ff88;
            font-weight: bold;
            font-size: 0.9em;
        }

        .file-info-stats {
            color: #aaa;
            font-size: 0.85em;
            margin-top: 5px;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-top: 15px;
        }

        .stat-item {
            background: rgba(255, 215, 0, 0.1);
            padding: 12px 8px;
            border-radius: 8px;
            text-align: center;
            border: 1px solid rgba(255, 215, 0, 0.3);
        }

        .stat-value {
            color: #ffd700;
            font-size: 1.5em;
            font-weight: bold;
        }

        .stat-label {
            color: #fff;
            font-size: 0.8em;
            margin-top: 3px;
        }

        .title-input {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #ffd700;
            background: rgba(0, 0, 0, 0.5);
            color: #fff;
            font-size: 1em;
        }

        .prize-select,
        .prize-count {
            margin-bottom: 15px;
        }

        .prize-select select,
        .prize-count input {
            width: 100%;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #ffd700;
            background: rgba(0, 0, 0, 0.5);
            color: #fff;
            font-size: 1em;
        }

        .prize-select label,
        .prize-count label {
            color: #fff;
            margin-bottom: 6px;
            display: block;
            font-size: 0.9em;
        }

        .display-options {
            margin-bottom: 15px;
        }

        .display-hint {
            color: #aaa;
            font-size: 0.9em;
            margin-bottom: 10px;
        }

        .checkbox-item {
            display: flex;
            align-items: center;
            margin-bottom: 10px;
            cursor: pointer;
        }

        .checkbox-item input[type="checkbox"] {
            width: 18px;
            height: 18px;
            margin-right: 10px;
            cursor: pointer;
            accent-color: #ffd700;
        }

        .checkbox-item label {
            color: #fff;
            font-size: 0.95em;
            cursor: pointer;
            user-select: none;
        }

        .title-input label {
            color: #fff;
            margin-bottom: 6px;
            display: block;
            font-size: 0.9em;
        }

        .history-section {
            margin-top: 15px;
            max-height: 250px;
            overflow-y: auto;
        }

        .history-round {
            background: rgba(255, 215, 0, 0.1);
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 8px;
            border-left: 3px solid #ffd700;
        }

        .history-title {
            color: #ffd700;
            font-weight: bold;
            margin-bottom: 6px;
            font-size: 0.95em;
        }

        .history-winners {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
        }

        .history-winner {
            background: rgba(255, 255, 255, 0.1);
            padding: 3px 8px;
            border-radius: 10px;
            color: #fff;
            font-size: 0.8em;
        }

        .empty-state {
            color: #aaa;
            text-align: center;
            padding: 15px;
            font-size: 0.9em;
        }

        /* Main Content */
        .main-container {
            width: 100%;
            max-width: 1400px;
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 1;
            position: relative;
        }



        .title-section {
            margin-bottom: 20px;
            position: relative;
            z-index: 10;
        }

        .main-title {
            font-size: 3em;
            color: #ffd700;
            font-weight: bold;
            text-shadow: 0 0 40px rgba(255, 215, 0, 0.8), 0 0 80px rgba(255, 215, 0, 0.4);
            text-align: center;
            letter-spacing: 5px;
        }

        .subtitle {
            font-size: 1.5em;
            color: #fff;
            text-align: center;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.5);
        }

        .lottery-display {
            background: linear-gradient(135deg, #991a1a 0%, #660000 50%, #991a1a 100%);
            border-radius: 30px;
            padding: 30px;
            text-align: center;
            height: 70vh;
            max-height: 800px;
            width: 100%;
            max-width: 1400px;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: center;
            position: relative;
            overflow: hidden;
            box-shadow: 0 0 80px rgba(255, 215, 0, 0.3);
            border: 4px solid #ffd700;
        }

        .prize-display {
            font-size: 2.5em;
            color: #ffd700;
            font-weight: bold;
            text-shadow: 0 0 30px rgba(255, 215, 0, 0.8);
            margin-bottom: 20px;
            min-height: 1.5em;
        }

        .winner-cards {
            overflow-y: auto;
            overflow-x: hidden;
            flex: 1;
            width: 100%;
            padding: 10px 0;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-content: flex-start;
            gap: 15px;
        }

        .prize-name {
            margin-bottom: 15px;
        }

        .prize-name input {
            width: 100%;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #ffd700;
            background: rgba(0, 0, 0, 0.5);
            color: #fff;
            font-size: 1em;
        }

        .prize-name label {
            color: #fff;
            margin-bottom: 6px;
            display: block;
            font-size: 0.9em;
        }

        .lottery-display::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.15) 0%, transparent 70%);
            animation: rotate 15s linear infinite;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .winner-name {
            font-size: 6em;
            color: #ffd700;
            font-weight: bold;
            text-shadow: 0 0 40px rgba(255, 215, 0, 0.9), 0 0 80px rgba(255, 215, 0, 0.6);
            position: relative;
            z-index: 1;
            animation: pulse 1s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .winner-info {
            color: #fff;
            font-size: 2em;
            margin-top: 20px;
            position: relative;
            z-index: 1;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.5);
        }

        .winner-cards {
            display: flex;
            flex-wrap: wrap;
            gap: 25px;
            justify-content: center;
            margin-top: 30px;
            position: relative;
            z-index: 1;
        }

        .winner-card {
            background: rgba(0, 0, 0, 0.7);
            border: 3px solid #ffd700;
            border-radius: 20px;
            padding: 30px 40px;
            text-align: center;
            transition: all 0.2s ease;
            min-width: 200px;
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.4);
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .winner-card-name {
            color: #ffd700;
            font-size: 2em;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .winner-card-info {
            color: #fff;
            font-size: 1.1em;
            margin-bottom: 5px;
        }

        .lottery-controls {
            display: flex;
            gap: 30px;
            justify-content: center;
            margin-top: 50px;
            margin-bottom: 60px;
            flex-wrap: wrap;
            z-index: 10;
            position: relative;
        }

        .btn {
            padding: 20px 60px;
            border: none;
            border-radius: 50px;
            font-size: 1.5em;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: bold;
            min-width: 200px;
            letter-spacing: 2px;
        }

        .btn-start {
            background: linear-gradient(135deg, #ffd700, #ffed4e);
            color: #8b0000;
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.6);
        }

        .btn-start:hover {
            transform: translateY(-5px);
            box-shadow: 0 0 50px rgba(255, 215, 0, 0.9);
        }

        .btn-stop {
            background: linear-gradient(135deg, #ff3366, #ff6b8a);
            color: #fff;
            box-shadow: 0 0 30px rgba(255, 51, 102, 0.6);
        }

        .btn-stop:hover {
            transform: translateY(-5px);
            box-shadow: 0 0 50px rgba(255, 51, 102, 0.9);
        }

        .btn-reset {
            background: linear-gradient(135deg, #666, #888);
            color: #fff;
        }

        .btn-reset:hover {
            transform: translateY(-5px);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none !important;
        }

        .confetti {
            position: fixed;
            width: 12px;
            height: 12px;
            top: -12px;
            animation: confettiFall 4s linear forwards;
            z-index: 999;
        }

        @keyframes confettiFall {
            to {
                top: 100vh;
                transform: rotate(1080deg);
            }
        }

        @media (max-width: 1200px) {
            .main-container {
                padding: 30px;
            }

            .main-title {
                font-size: 3em;
            }

            .winner-name {
                font-size: 4em;
            }

            .lottery-display {
                padding: 60px 40px;
            }
        }

        @media (max-width: 900px) {
            body {
                height: auto;
                min-height: 100vh;
                overflow-y: auto;
            }

            .sidebar {
                width: 100%;
                left: -100%;
            }

            .main-container {
                padding: 20px;
            }

            .main-title {
                font-size: 2.5em;
            }

            .winner-name {
                font-size: 3em;
            }

            .lottery-display {
                padding: 40px 30px;
                height: auto;
                max-height: none;
                min-height: 400px;
            }

            .btn {
                padding: 15px 40px;
                font-size: 1.2em;
            }

            .winner-cards {
                overflow: visible;
            }
        }

        @media (max-width: 600px) {
            body {
                height: auto;
                min-height: 100vh;
                overflow-y: auto;
            }

            .main-title {
                font-size: 2em;
            }

            .winner-name {
                font-size: 2em;
            }

            .lottery-display {
                padding: 30px 20px;
                height: auto;
                max-height: none;
                min-height: 350px;
            }

            .winner-card {
                padding: 20px 30px;
                min-width: 150px;
            }

            .winner-cards {
                overflow: visible;
            }
        }
    </style>
</head>
<body>
    <!-- Sidebar -->
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <h2>⚙️ 设置面板</h2>
        </div>

        <div class="panel">
            <div class="panel-title">🎨 标题设置</div>
            <div class="title-input">
                <label>年会标题</label>
                <input type="text" id="titleInput" value="年会抽奖活动" placeholder="请输入年会标题">
            </div>
        </div>

        <div class="panel">
            <div class="panel-title">�️ Logo上传</div>
            <div class="upload-area" id="logoUploadArea">
                <div class="upload-icon">📷</div>
                <div class="upload-text">点击上传Logo</div>
                <div class="upload-hint">PNG、JPG 格式</div>
                <input type="file" id="logoInput" accept=".png,.jpg,.jpeg,.gif,.webp">
            </div>
            <div class="file-info" id="logoInfo" style="display: none;">
                <div class="file-info-text">✅ Logo已上传</div>
            </div>
            <div class="logo-size-control" id="logoSizeControl" style="display: none; margin-top: 15px;">
                <label style="color: #fff; display: block; margin-bottom: 8px; font-size: 0.9em;">Logo大小</label>
                <input type="range" id="logoSizeSlider" min="50" max="200" value="100" style="width: 100%;">
                <div style="display: flex; justify-content: space-between; color: #aaa; font-size: 0.8em; margin-top: 5px;">
                    <span>小</span>
                    <span id="logoSizeValue">100%</span>
                    <span>大</span>
                </div>
                <button class="btn btn-reset" id="resetLogoBtn" style="margin-top: 10px; width: 100%;">重置Logo</button>
            </div>
        </div>

        <div class="panel">
            <div class="panel-title">🌄 背景图片</div>
            <div class="upload-area" id="bgUploadArea">
                <div class="upload-icon">🖼️</div>
                <div class="upload-text">点击上传背景图</div>
                <div class="upload-hint">PNG、JPG 格式</div>
                <input type="file" id="bgInput" accept=".png,.jpg,.jpeg,.gif,.webp">
            </div>
            <div class="file-info" id="bgInfo" style="display: none;">
                <div class="file-info-text">✅ 背景图已上传</div>
            </div>
            <button class="btn btn-reset" id="resetBgBtn" style="margin-top: 10px; width: 100%; display: none;">重置背景</button>
        </div>

        <div class="panel">
            <div class="panel-title">� 导入名单</div>
            <div class="upload-area" id="uploadArea">
                <div class="upload-icon">📂</div>
                <div class="upload-text">点击或拖拽上传</div>
                <div class="upload-hint">CSV、Excel 格式</div>
                <input type="file" id="fileInput" accept=".csv,.xlsx,.xls">
            </div>
            <div class="file-info" id="fileInfo">
                <div class="file-info-text">✅ 导入成功</div>
                <div class="file-info-stats" id="fileStats"></div>
            </div>

            <div class="stats">
                <div class="stat-item">
                    <div class="stat-value" id="totalCount">0</div>
                    <div class="stat-label">总人数</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="remainCount">0</div>
                    <div class="stat-label">剩余</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="winnerCount">0</div>
                    <div class="stat-label">已中奖</div>
                </div>
            </div>
        </div>

        <div class="panel">
            <div class="panel-title">🎁 奖品设置</div>
            <div class="prize-select">
                <label>奖品等级</label>
                <select id="prizeSelect">
                    <option value="特等奖">特等奖</option>
                    <option value="一等奖">一等奖</option>
                    <option value="二等奖">二等奖</option>
                    <option value="三等奖">三等奖</option>
                    <option value="四等奖">四等奖</option>
                    <option value="五等奖">五等奖</option>
                    <option value="阳光普照奖">阳光普照奖</option>
                </select>
            </div>
            <div class="prize-name">
                <label>自定义奖品名称（可选）</label>
                <input type="text" id="prizeName" placeholder="如：iPhone 15、华为Mate 60">
            </div>
            <div class="prize-count">
                <label>中奖人数</label>
                <input type="number" id="prizeCount" value="1" min="1">
            </div>
        </div>

        <div class="panel">
            <div class="panel-title">📋 显示设置</div>
            <div class="display-options" id="displayOptions">
                <p class="display-hint">请上传名单文件后选择要显示的信息</p>
            </div>
        </div>

        <div class="panel">
            <div class="panel-title">📜 抽奖历史</div>
            <div class="history-section" id="historySection">
                <div class="empty-state">暂无记录</div>
            </div>
        </div>
    </div>

    <!-- Sidebar Toggle -->
    <div class="sidebar-toggle" id="sidebarToggle">
        <span></span>
        <span></span>
        <span></span>
    </div>

    <!-- Logo Display -->
    <div class="logo-display" id="logoDisplay" style="display: none;">
        <img id="logoImage" src="" alt="Logo">
    </div>

    <!-- Main Content -->
    <div class="main-container">
        <div class="title-section">
            <h1 class="main-title" id="mainTitle">年会抽奖活动</h1>
        </div>

        <div class="lottery-display" id="lotteryDisplay">
            <div class="prize-display" id="prizeDisplay"></div>
            <div class="winner-cards" id="winnerCards"></div>
        </div>

        <div class="lottery-controls">
            <button class="btn btn-start" id="startBtn" disabled>开始抽奖</button>
            <button class="btn btn-stop" id="stopBtn" disabled>停止</button>
            <button class="btn btn-reset" id="resetBtn">重置</button>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script>
        let allParticipants = [];
        let remainingParticipants = [];
        let winners = [];
        let history = [];
        let isLotteryRunning = false;
        let scrollInterval = null;
        let currentWinners = [];
        let columnNames = [];

        const sidebar = document.getElementById('sidebar');
        const sidebarToggle = document.getElementById('sidebarToggle');
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        const fileInfo = document.getElementById('fileInfo');
        const fileStats = document.getElementById('fileStats');
        const totalCount = document.getElementById('totalCount');
        const remainCount = document.getElementById('remainCount');
        const winnerCount = document.getElementById('winnerCount');
        const startBtn = document.getElementById('startBtn');
        const stopBtn = document.getElementById('stopBtn');
        const resetBtn = document.getElementById('resetBtn');
        const winnerCards = document.getElementById('winnerCards');
        const historySection = document.getElementById('historySection');
        const prizeSelect = document.getElementById('prizeSelect');
        const prizeCount = document.getElementById('prizeCount');
        const prizeName = document.getElementById('prizeName');
        const displayOptions = document.getElementById('displayOptions');
        const titleInput = document.getElementById('titleInput');
        const mainTitle = document.getElementById('mainTitle');
        const prizeDisplay = document.getElementById('prizeDisplay');
        const logoInput = document.getElementById('logoInput');
        const logoUploadArea = document.getElementById('logoUploadArea');
        const logoInfo = document.getElementById('logoInfo');
        const logoDisplay = document.getElementById('logoDisplay');
        const logoImage = document.getElementById('logoImage');
        const logoSizeControl = document.getElementById('logoSizeControl');
        const logoSizeSlider = document.getElementById('logoSizeSlider');
        const logoSizeValue = document.getElementById('logoSizeValue');
        const bgInput = document.getElementById('bgInput');
        const bgUploadArea = document.getElementById('bgUploadArea');
        const bgInfo = document.getElementById('bgInfo');
        const resetBgBtn = document.getElementById('resetBgBtn');
        const resetLogoBtn = document.getElementById('resetLogoBtn');

        let currentLogoSize = 100;

        sidebarToggle.addEventListener('click', (e) => {
            e.stopPropagation();
            sidebar.classList.toggle('open');
        });

        // Click outside to close sidebar
        document.addEventListener('click', (e) => {
            if (sidebar.classList.contains('open') && 
                !sidebar.contains(e.target) && 
                !sidebarToggle.contains(e.target)) {
                sidebar.classList.remove('open');
            }
        });

        // Logo Upload
        logoUploadArea.addEventListener('click', () => logoInput.click());
        logoUploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            logoUploadArea.classList.add('hover');
        });
        logoUploadArea.addEventListener('dragleave', () => {
            logoUploadArea.classList.remove('hover');
        });
        logoUploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            logoUploadArea.classList.remove('hover');
            if (e.dataTransfer.files.length > 0) {
                handleLogoUpload(e.dataTransfer.files[0]);
            }
        });
        logoInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                handleLogoUpload(e.target.files[0]);
            }
        });

        function handleLogoUpload(file) {
            if (!file.type.startsWith('image/')) {
                alert('请上传图片文件');
                return;
            }

            const reader = new FileReader();
            reader.onload = (e) => {
                logoImage.src = e.target.result;
                logoDisplay.style.display = 'block';
                logoInfo.style.display = 'block';
                logoSizeControl.style.display = 'block';
                logoSizeSlider.value = 100;
                logoSizeValue.textContent = '100%';
                updateLogoSize(100);
            };
            reader.readAsDataURL(file);
        }

        // Logo Size Control
        logoSizeSlider.addEventListener('input', (e) => {
            const size = e.target.value;
            logoSizeValue.textContent = size + '%';
            updateLogoSize(size);
        });

        function updateLogoSize(percent) {
            currentLogoSize = percent;
            const baseWidth = 150;
            const baseHeight = 100;
            logoDisplay.style.maxWidth = (baseWidth * percent / 100) + 'px';
            logoDisplay.style.maxHeight = (baseHeight * percent / 100) + 'px';
            logoImage.style.maxHeight = (baseHeight * percent / 100) + 'px';
        }

        // Background Image Upload
        bgUploadArea.addEventListener('click', () => bgInput.click());
        bgUploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            bgUploadArea.classList.add('hover');
        });
        bgUploadArea.addEventListener('dragleave', () => {
            bgUploadArea.classList.remove('hover');
        });
        bgUploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            bgUploadArea.classList.remove('hover');
            if (e.dataTransfer.files.length > 0) {
                handleBgUpload(e.dataTransfer.files[0]);
            }
        });
        bgInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                handleBgUpload(e.target.files[0]);
            }
        });

        function handleBgUpload(file) {
            if (!file.type.startsWith('image/')) {
                alert('请上传图片文件');
                return;
            }

            const reader = new FileReader();
            reader.onload = (e) => {
                document.body.style.background = `url('${e.target.result}')`;
                document.body.style.backgroundSize = 'cover';
                document.body.style.backgroundPosition = 'center';
                document.body.style.backgroundRepeat = 'no-repeat';
                bgInfo.style.display = 'block';
                resetBgBtn.style.display = 'block';
            };
            reader.readAsDataURL(file);
        }

        // Reset Background
        resetBgBtn.addEventListener('click', () => {
            document.body.style.background = 'linear-gradient(135deg, #5c0000 0%, #8b0000 35%, #991a1a 65%, #5c0000 100%)';
            document.body.style.backgroundSize = 'cover';
            document.body.style.backgroundPosition = 'center';
            document.body.style.backgroundRepeat = 'no-repeat';
            bgInfo.style.display = 'none';
            resetBgBtn.style.display = 'none';
            bgInput.value = '';
        });

        // Reset Logo
        resetLogoBtn.addEventListener('click', () => {
            logoDisplay.style.display = 'none';
            logoInfo.style.display = 'none';
            logoSizeControl.style.display = 'none';
            logoInput.value = '';
            logoSizeSlider.value = 100;
            logoSizeValue.textContent = '100%';
            updateLogoSize(100);
        });

        titleInput.addEventListener('input', () => {
            mainTitle.textContent = titleInput.value || '年会抽奖活动';
        });

        function handleFile(file) {
            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    let jsonData = [];
                    
                    if (file.name.endsWith('.csv')) {
                        const text = e.target.result;
                        jsonData = parseCSV(text);
                    } else {
                        const data = new Uint8Array(e.target.result);
                        const workbook = XLSX.read(data, { type: 'array' });
                        const firstSheet = workbook.Sheets[workbook.SheetNames[0]];
                        jsonData = XLSX.utils.sheet_to_json(firstSheet);
                    }

                    if (jsonData.length === 0) {
                        alert('文件内容为空或格式不正确');
                        return;
                    }

                    const columns = Object.keys(jsonData[0]);
                    
                    allParticipants = jsonData.map((row, index) => {
                        const newRow = {};
                        columns.forEach(col => {
                            newRow[col] = String(row[col] || '').trim();
                        });
                        return newRow;
                    });

                    remainingParticipants = [...allParticipants];
                    winners = [];
                    history = [];

                    generateDisplayOptions(columns);

                    updateStats();
                    fileInfo.classList.add('success');
                    fileStats.textContent = `共 ${allParticipants.length} 人`;

                    startBtn.disabled = false;
                    updateHistory();
                } catch (error) {
                    console.error('文件解析失败:', error);
                    alert('文件解析失败，请检查文件格式');
                }
            };

            if (file.name.endsWith('.csv')) {
                reader.readAsText(file);
            } else {
                reader.readAsArrayBuffer(file);
            }
        }

        function parseCSV(text) {
            const lines = text.trim().split('\n');
            if (lines.length < 2) return [];

            const headers = lines[0].split(',').map(h => h.trim());
            const result = [];

            for (let i = 1; i < lines.length; i++) {
                const values = lines[i].split(',').map(v => v.trim());
                const obj = {};
                headers.forEach((header, index) => {
                    obj[header] = values[index] || '';
                });
                result.push(obj);
            }

            return result;
        }

        function updateStats() {
            totalCount.textContent = allParticipants.length;
            remainCount.textContent = remainingParticipants.length;
            winnerCount.textContent = winners.length;
        }

        function generateDisplayOptions(columns) {
            columnNames = columns;
            displayOptions.innerHTML = '';
            
            columns.forEach(col => {
                const isName = col.toLowerCase().includes('姓名') || col.toLowerCase().includes('name');
                const isId = col.toLowerCase().includes('工号') || col.toLowerCase().includes('id');
                const isDefault = isName || isId;
                
                const item = document.createElement('div');
                item.className = 'checkbox-item';
                item.innerHTML = `
                    <input type="checkbox" id="display-${col}" value="${col}" ${isDefault ? 'checked' : ''}>
                    <label for="display-${col}">${col}</label>
                `;
                displayOptions.appendChild(item);
            });
        }

        function getSelectedColumns() {
            const checkboxes = displayOptions.querySelectorAll('input[type="checkbox"]:checked');
            return Array.from(checkboxes).map(cb => cb.value);
        }

        function getCardHTML(person, cardId = null) {
            const selectedCols = getSelectedColumns();
            let html = '';
            
            if (cardId) {
                html += `<div class="winner-card" id="card-${cardId}">`;
            } else {
                html += `<div class="winner-card">`;
            }
            
            if (selectedCols.length > 0) {
                selectedCols.forEach((col, index) => {
                    const value = person[col] || person[col.toLowerCase()] || '';
                    if (value) {
                        if (index === 0) {
                            html += `<div class="winner-card-name">${value}</div>`;
                        } else {
                            html += `<div class="winner-card-info">${col}：${value}</div>`;
                        }
                    }
                });
            } else {
                for (let key in person) {
                    if (person[key]) {
                        html += `<div class="winner-card-name">${person[key]}</div>`;
                        break;
                    }
                }
            }
            
            html += `</div>`;
            return html;
        }

        function updateCardContent(card, person) {
            const selectedCols = getSelectedColumns();
            
            let html = '';
            if (selectedCols.length > 0) {
                selectedCols.forEach((col, index) => {
                    const value = person[col] || person[col.toLowerCase()] || '';
                    if (value) {
                        if (index === 0) {
                            html += `<div class="winner-card-name">${value}</div>`;
                        } else {
                            html += `<div class="winner-card-info">${col}：${value}</div>`;
                        }
                    }
                });
            } else {
                for (let key in person) {
                    if (person[key]) {
                        html += `<div class="winner-card-name">${person[key]}</div>`;
                        break;
                    }
                }
            }
            
            card.innerHTML = html;
        }

        function startLottery() {
            if (isLotteryRunning) return;
            if (remainingParticipants.length === 0) {
                alert('没有可抽奖的人员了！');
                return;
            }

            const count = parseInt(prizeCount.value) || 1;
            if (count > remainingParticipants.length) {
                alert(`剩余人数不足，当前剩余 ${remainingParticipants.length} 人`);
                return;
            }

            isLotteryRunning = true;
            startBtn.disabled = true;
            stopBtn.disabled = false;

            const customPrizeName = prizeName.value.trim();
            const prizeLevel = prizeSelect.value;
            if (customPrizeName) {
                prizeDisplay.textContent = `${prizeLevel}：${customPrizeName}`;
            } else {
                prizeDisplay.textContent = prizeLevel;
            }

            const displayCount = remainingParticipants.length >= 10 ? 10 : 1;
            let cardsHTML = '';
            for (let i = 0; i < displayCount; i++) {
                const person = remainingParticipants[i % remainingParticipants.length];
                cardsHTML += getCardHTML(person, i);
            }
            winnerCards.innerHTML = cardsHTML;

            scrollInterval = setInterval(() => {
                const cards = winnerCards.querySelectorAll('.winner-card');
                cards.forEach((card, i) => {
                    const idx = Math.floor(Math.random() * remainingParticipants.length);
                    const person = remainingParticipants[idx];
                    updateCardContent(card, person);
                });
            }, 50);
        }

        function stopLottery() {
            if (!isLotteryRunning) return;

            isLotteryRunning = false;
            clearInterval(scrollInterval);

            const prizeLevel = prizeSelect.value;
            const customPrizeName = prizeName.value.trim();
            let prize;
            if (customPrizeName) {
                prize = `${prizeLevel}：${customPrizeName}`;
            } else {
                prize = prizeLevel;
            }
            const count = parseInt(prizeCount.value) || 1;

            currentWinners = [];
            for (let i = 0; i < count; i++) {
                if (remainingParticipants.length === 0) break;
                const winnerIndex = Math.floor(Math.random() * remainingParticipants.length);
                const winner = remainingParticipants.splice(winnerIndex, 1)[0];
                currentWinners.push(winner);
                winners.push({ ...winner, prize });
            }

            winnerCards.innerHTML = '';
            
            currentWinners.forEach(winner => {
                winnerCards.innerHTML += getCardHTML(winner);
            });

            history.push({
                round: history.length + 1,
                prize: prize,
                winners: currentWinners
            });

            updateStats();
            updateHistory();
            showConfetti();

            startBtn.disabled = remainingParticipants.length === 0;
            stopBtn.disabled = true;
        }

        function resetLottery() {
            if (isLotteryRunning) {
                clearInterval(scrollInterval);
                isLotteryRunning = false;
            }

            remainingParticipants = [...allParticipants];
            winners = [];
            history = [];
            currentWinners = [];

            startBtn.disabled = allParticipants.length === 0;
            stopBtn.disabled = true;

            prizeDisplay.textContent = '';
            winnerCards.innerHTML = '';

            updateStats();
            updateHistory();
        }

        function updateHistory() {
            if (history.length === 0) {
                historySection.innerHTML = '<div class="empty-state">暂无记录</div>';
                return;
            }

            historySection.innerHTML = history.map(item => `
                <div class="history-round">
                    <div class="history-title">第 ${item.round} 轮 - ${item.prize}</div>
                    <div class="history-winners">
                        ${item.winners.map(winner => {
                            let name = '未知';
                            let id = '';
                            for (let key in winner) {
                                if (key.toLowerCase().includes('姓名') || key.toLowerCase().includes('name')) {
                                    name = winner[key];
                                } else if (key.toLowerCase().includes('工号') || key.toLowerCase().includes('id')) {
                                    id = winner[key];
                                }
                            }
                            return `<span class="history-winner">${name}${id ? ` (${id})` : ''}</span>`;
                        }).join('')}
                    </div>
                </div>
            `).join('');
        }

        function showConfetti() {
            const colors = ['#ffd700', '#ff3366', '#00ff88', '#00d4ff', '#ff6b8a', '#ff6600', '#00ff00'];
            for (let i = 0; i < 150; i++) {
                const confetti = document.createElement('div');
                confetti.className = 'confetti';
                confetti.style.left = Math.random() * 100 + '%';
                confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                confetti.style.animationDelay = Math.random() * 2 + 's';
                confetti.style.borderRadius = Math.random() > 0.5 ? '50%' : '0';
                confetti.style.width = (Math.random() * 8 + 8) + 'px';
                confetti.style.height = confetti.style.width;
                document.body.appendChild(confetti);

                setTimeout(() => confetti.remove(), 6000);
            }
        }

        uploadArea.addEventListener('click', () => fileInput.click());

        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('dragover');
        });

        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('dragover');
        });

        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            const file = e.dataTransfer.files[0];
            if (file) handleFile(file);
        });

        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) handleFile(file);
        });

        startBtn.addEventListener('click', startLottery);
        stopBtn.addEventListener('click', stopLottery);
        resetBtn.addEventListener('click', resetLottery);

        prizeSelect.addEventListener('change', () => {
            const defaultCounts = {
                '一等奖': 1,
                '二等奖': 2,
                '三等奖': 3,
                '四等奖': 5,
                '五等奖': 10,
                '阳光普照奖': allParticipants.length - winners.length
            };
            prizeCount.value = defaultCounts[prizeSelect.value] || 1;
        });
    </script>
</body>
</html>
